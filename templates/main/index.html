<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f1e8;
            --surface: #fffaf2;
            --ink: #1f2933;
            --accent: #0f766e;
            --accent-soft: #cceee8;
            --border: #d8cdbd;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, #fff7df 0, transparent 35%),
                linear-gradient(180deg, #f3ece0 0%, var(--bg) 100%);
        }

        main {
            width: min(960px, calc(100% - 32px));
            margin: 48px auto;
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: rgba(255, 250, 242, 0.9);
            backdrop-filter: blur(8px);
            box-shadow: 0 24px 60px rgba(31, 41, 51, 0.08);
        }

        .badge {
            display: inline-block;
            margin-bottom: 16px;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            max-width: 60ch;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        ul {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin: 32px 0 0;
            padding: 0;
            list-style: none;
        }

        li {
            padding: 18px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: #fff;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            main {
                margin: 20px auto;
                padding: 24px;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>
    <main>
        <span class="badge">MVP Foundation</span>
        <h1>{{ project_name }}</h1>
        <p>
            Проект переведен на базовую архитектуру для сайта цеха: с отдельными доменными
            модулями, кастомным пользователем и подготовкой к бронированию оборудования.
        </p>

        <ul>
            {% for module in modules %}
                <li>{{ module }}</li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
